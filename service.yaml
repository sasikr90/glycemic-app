
apiVersion: v1
kind: Service
metadata:
  name: glycemic-service                     # Service name
  namespace: glycemic                        # Same namespace as the Deployment
  labels:
    app: glycemic-app                        # Label on the Service object

spec:
  selector:
    app: glycemic-app                        # Send traffic to Pods with this label

  ports:
    - protocol: TCP
      port: 80                               # Service port inside the cluster
      targetPort: 80                         # Forward traffic to container port 80
      nodePort: 30056                        # External port on Docker Desktop K8s node

  type: NodePort                             # Expose app using NodePort

