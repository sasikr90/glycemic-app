name: glycemic-app-ci-cd

# Trigger workflow automatically when code is pushed to main branch
# Also allow manual execution from GitHub Actions UI using "Run workflow"
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Global reusable variables
env:
  IMAGE_NAME: sasikr90/glycemic-app   # Docker Hub image repository
  DEPLOYMENT_FILE: deployment.yaml    # Path to Kubernetes deployment manifest file

jobs:
  build-scan-push-update:
    name: Build image, scan, push, and update deployment manifest
    runs-on: ubuntu-latest

    # Required because this workflow will commit deployment.yaml back to the same repo
    permissions:
      contents: write

    steps:
      # ------------------------------------------------------------
      # STEP 1 - Checkout repository code
      # ------------------------------------------------------------
      # fetch-depth: 0 gets full git history.
      # Useful because later this workflow will commit/push back to the same branch.
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # STEP 2 - Set image tag from current Git commit SHA
      # ------------------------------------------------------------
      # Example:
      #   full SHA   = 7c9613a4f1e2d...
      #   short tag  = 7c9613a
      #
      # Using commit SHA gives each image a unique immutable tag.
      - name: Set image tag from commit SHA
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # STEP 3 - Set up Docker Buildx
      # ------------------------------------------------------------
      # Buildx is Docker's recommended build engine for GitHub Actions.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # STEP 4 - Login to Docker Hub
      # ------------------------------------------------------------
      # Required before pushing images to Docker Hub.
      # DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must exist in GitHub Secrets.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------
      # STEP 5 - Build Docker image locally in the GitHub runner
      # ------------------------------------------------------------
      # This creates an image tagged with the Git commit SHA.
      # Example:
      #   sasikr90/glycemic-app:7c9613a
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # ------------------------------------------------------------
      # STEP 6 - Scan Docker image with Trivy
      # ------------------------------------------------------------
      # Trivy checks the built image for known vulnerabilities.
      #
      # Current recommendation for your learning setup:
      # - exit-code: '0'  -> show vulnerabilities in logs but do not fail pipeline
      # - scanners: vuln  -> only vulnerability scan, skip secret scanning for faster execution
      #
      # Once your pipeline is stable, you can tighten this back to:
      #   exit-code: '1'
      #   severity: CRITICAL
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln

      # ------------------------------------------------------------
      # STEP 7 - Push image with SHA tag to Docker Hub
      # ------------------------------------------------------------
      # Push the immutable versioned image first.
      - name: Push Docker image with SHA tag
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      # ------------------------------------------------------------
      # STEP 8 - Tag the same image as "latest" and push it
      # ------------------------------------------------------------
      # latest is optional, but convenient for quick testing.
      # Kubernetes GitOps deployment should still use SHA tag, not latest.
      - name: Tag and push latest image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      # ------------------------------------------------------------
      # STEP 9 - Update deployment manifest with the new image tag
      # ------------------------------------------------------------
      # Argo CD watches Git, not Docker Hub.
      # So after pushing the image, we must update deployment.yaml
      # with the new image tag so Argo CD sees a Git change and deploys it.
      #
      # Example replacement:
      #   image: sasikr90/glycemic-app:oldtag
      # becomes
      #   image: sasikr90/glycemic-app:7c9613a
      - name: Update Kubernetes deployment manifest with new image tag
        run: |
          sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|g" $DEPLOYMENT_FILE

      # ------------------------------------------------------------
      # STEP 10 - Display updated deployment file for debugging
      # ------------------------------------------------------------
      # Helpful to verify that the image tag was updated correctly.
      - name: Display updated deployment file
        run: |
          echo "Updated deployment file content:"
          cat $DEPLOYMENT_FILE

      # ------------------------------------------------------------
      # STEP 11 - Commit and push updated deployment manifest back to GitHub
      # ------------------------------------------------------------
      # This is the GitOps trigger point.
      # Once deployment.yaml is committed with the new image tag,
      # Argo CD detects the repo change and syncs it to Kubernetes.
      #
      # [skip ci] is added in commit message so this CI-generated commit
      # does not trigger an unnecessary pipeline loop.
      - name: Commit and push updated deployment manifest
        run: |
          # Configure Git identity for the automated commit
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Stage only the deployment file we modified
          git add $DEPLOYMENT_FILE

          # If there is no actual file change, skip commit/push
          if git diff --cached --quiet; then
            echo "No manifest changes detected. Nothing to commit."
          else
            # Commit updated image tag into deployment.yaml
            git commit -m "Update deployment image to $IMAGE_TAG [skip ci]"

            # Pull latest remote changes before pushing.
            # This avoids non-fast-forward push errors if main moved ahead.
            git pull --rebase origin main

            # Push updated deployment manifest back to the same branch
            git push origin main
          fi