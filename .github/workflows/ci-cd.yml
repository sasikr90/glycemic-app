name: glycemic-app-ci-cd

# This workflow runs whenever code is pushed to the main branch.
# In your case, main is the branch where app code + k8s manifests are stored.
on:
  push:
    branches:
      - main

# Global environment variables.
# We keep reusable values here so we don't repeat them multiple times in the workflow.
env:
  IMAGE_NAME: sasikr90/glycemic-app         # Docker Hub repository name where image will be pushed
  DEPLOYMENT_FILE: deployment.yaml          # Kubernetes deployment manifest file inside the same repo

jobs:
  build-scan-push-update:
    name: Build image, scan with Trivy, push to Docker Hub, update deployment manifest
    runs-on: ubuntu-latest                  # GitHub-hosted Linux runner

    # We need write permission because later this workflow will modify deployment.yaml
    # and push that updated file back into the same GitHub repository.
    permissions:
      contents: write

    steps:
      # ------------------------------------------------------------
      # STEP 1 - Checkout source code from the current GitHub repo
      # ------------------------------------------------------------
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # fetch-depth: 0 fetches full git history.
          # Not mandatory for basic build, but useful when the workflow itself commits back to the repo.

      # ------------------------------------------------------------
      # STEP 2 - Prevent infinite workflow loop
      # ------------------------------------------------------------
      # Why do we need this?
      # Because this workflow will update deployment.yaml and commit it back to the same repo.
      # That new commit would normally trigger the workflow again and cause a loop.
      #
      # So here we check the latest commit message.
      # If the commit message contains [skip ci], we stop the workflow immediately.
      - name: Stop workflow if commit was created by CI
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Latest commit message: $COMMIT_MSG"

          if echo "$COMMIT_MSG" | grep -q "\[skip ci\]"; then
            echo "Commit contains [skip ci], so exiting workflow to avoid loop."
            exit 0
          fi

      # ------------------------------------------------------------
      # STEP 3 - Generate image tag from Git commit SHA
      # ------------------------------------------------------------
      # Why use commit SHA?
      # Because every build gets a unique immutable image tag.
      # Example:
      #   sasikr90/glycemic-app:4f8a1c2
      #
      # This is much better than always using latest because:
      # - rollback is easier
      # - we know exactly which code version is deployed
      # - Argo CD/GitOps history becomes clearer
      - name: Set image tag from commit SHA
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
        # ${GITHUB_SHA::7} takes first 7 characters of the commit SHA
        # Example full SHA: 4f8a1c2f3e7a9b...
        # Short tag becomes: 4f8a1c2

      # ------------------------------------------------------------
      # STEP 4 - Set up Docker Buildx
      # ------------------------------------------------------------
      # Buildx is Docker's modern build engine.
      # It is recommended in GitHub Actions and supports better caching and advanced builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # STEP 5 - Log in to Docker Hub
      # ------------------------------------------------------------
      # Required because we are going to push the built image to Docker Hub.
      # Username and token are stored securely in GitHub Secrets.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------
      # STEP 6 - Build Docker image locally on the GitHub runner
      # ------------------------------------------------------------
      # We build the image before scanning because Trivy should scan the exact image
      # that we plan to push and deploy.
      #
      # We tag the image using the unique IMAGE_TAG created from the commit SHA.
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # ------------------------------------------------------------
      # STEP 7 - Run Trivy vulnerability scan on the built image
      # ------------------------------------------------------------
      # Trivy scans:
      # - OS packages in the image
      # - application dependencies
      # - known CVEs
      #
      # Important settings:
      # - exit-code: '1'   -> fail the pipeline if vulnerabilities of selected severities are found
      # - ignore-unfixed   -> don't fail for issues that currently have no fix available
      # - severity         -> only fail for HIGH and CRITICAL vulnerabilities
      #
      # You can relax this later for learning by removing exit-code or changing severity.
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ------------------------------------------------------------
      # STEP 8 - Push image with commit-SHA tag to Docker Hub
      # ------------------------------------------------------------
      # This happens only if Trivy scan passed.
      # We push the immutable versioned tag first.
      - name: Push Docker image with SHA tag
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      # ------------------------------------------------------------
      # STEP 9 - Also tag and push "latest"
      # ------------------------------------------------------------
      # Why keep latest?
      # - convenient for quick manual testing
      # - useful when you just want to pull the newest image quickly
      #
      # But for Kubernetes deployment / GitOps, commit SHA tag is safer and preferred.
      - name: Tag and push latest image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

      # ------------------------------------------------------------
      # STEP 10 - Update deployment.yaml with the new image tag
      # ------------------------------------------------------------
      # We want Argo CD to deploy the new image version.
      # Since Argo CD watches Git, we must update deployment.yaml in this repo.
      #
      # Example old line:
      #   image: sasikr90/glycemic-app:latest
      #
      # Example new line after replacement:
      #   image: sasikr90/glycemic-app:4f8a1c2
      #
      # The sed command below replaces the entire image line.
      - name: Update Kubernetes deployment manifest with new image tag
        run: |
          sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|g" $DEPLOYMENT_FILE

      # ------------------------------------------------------------
      # STEP 11 - Show the updated deployment file in logs
      # ------------------------------------------------------------
      # This is optional but very useful for debugging.
      # You can verify that the image line was correctly replaced.
      - name: Display updated deployment file
        run: |
          echo "Updated deployment.yaml content:"
          cat $DEPLOYMENT_FILE

      # ------------------------------------------------------------
      # STEP 12 - Commit the updated deployment.yaml back to GitHub
      # ------------------------------------------------------------
      # This is the GitOps trigger point.
      # Once deployment.yaml is committed with the new image tag,
      # Argo CD will notice the repo change and sync it to Kubernetes.
      #
      # We add [skip ci] in the commit message so that this CI-generated commit
      # does NOT trigger the workflow again and create an infinite loop.
      - name: Commit and push updated deployment manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add $DEPLOYMENT_FILE

          # Check whether deployment.yaml actually changed before committing.
          # This avoids "nothing to commit" errors.
          if git diff --cached --quiet; then
            echo "No manifest changes detected. Nothing to commit."
          else
            git commit -m "Update deployment image to $IMAGE_TAG [skip ci]"
            git push origin main
          fi
